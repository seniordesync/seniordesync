<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="350">
  <defs>
    <style>
      @keyframes float1 { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-25px) rotate(3deg); } }
      @keyframes float2 { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(-4deg); } }
      @keyframes float3 { 0%, 100% { transform: translateY(0px) scale(1); } 50% { transform: translateY(-20px) scale(1.02); } }
      @keyframes pulse { 0%, 100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.15) rotate(15deg); } }
      @keyframes sway { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
      
      .shape-green { animation: float1 6s ease-in-out infinite; transform-origin: 30% 50%; }
      .shape-blue { animation: float2 7s ease-in-out infinite; transform-origin: 60% 40%; }
      .shape-red { animation: float3 5s ease-in-out infinite; transform-origin: 80% 50%; }
      .shape-yellow { animation: pulse 4s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
      .character { animation: sway 3s ease-in-out infinite; transform-origin: 50% 100%; transform-box: fill-box; }
    </style>
  </defs>

  <!-- Big Green Abstract Leaf/Blob -->
  <g class="shape-green">
    <path d="M 120 220 C 50 250 40 100 150 60 C 260 20 360 80 350 180 C 340 280 190 190 120 220 Z" fill="#0E9F6E" />
    <path d="M 280 200 C 350 280 480 260 450 120 C 420 -20 200 40 280 200 Z" fill="#057A55" />
    <path d="M 220 150 L 250 80" stroke="#046C4E" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- Blue Cylinder -->
  <g class="shape-blue" transform="translate(420, 80)">
    <path d="M 0 30 L 0 160 A 50 25 0 0 0 100 160 L 100 30 A 50 25 0 0 1 0 30 Z" fill="#3F83F8" />
    <ellipse cx="50" cy="30" rx="50" ry="25" fill="#1C64F2" />
  </g>

  <!-- Red Heart / Blob -->
  <g class="shape-red">
    <path d="M 520 150 C 520 80 620 60 650 120 C 680 60 780 80 780 150 C 780 230 650 280 650 280 C 650 280 520 230 520 150 Z" fill="#F05252" />
  </g>

  <!-- Yellow Starburst -->
  <g class="shape-yellow" transform="translate(320, 150)">
    <path d="M 40 0 L 50 30 L 80 20 L 60 45 L 90 60 L 60 70 L 70 100 L 45 80 L 20 100 L 30 70 L 0 60 L 30 45 L 10 20 L 40 30 Z" fill="#FACA15" />
  </g>

  <!-- Abstract Character Holding Shapes -->
  <g class="character" transform="translate(370, 260)">
    <!-- Body -->
    <circle cx="30" cy="20" r="18" fill="#0E9F6E" />
    <!-- Legs -->
    <path d="M 20 35 L 10 50 M 40 35 L 50 50" stroke="#1F2937" stroke-width="5" stroke-linecap="round" />
    <path d="M 5 50 L 15 50 M 45 50 L 55 50" stroke="#1F2937" stroke-width="5" stroke-linecap="round" />
    <!-- Big Arms pushing up -->
    <path d="M -10 10 C -20 -10 0 -20 10 -15 M 70 10 C 80 -10 60 -20 50 -15" stroke="#1F2937" stroke-width="4" stroke-linecap="round" fill="none" />
    <path d="M 10 0 C -5 5 -10 20 10 20 M 50 0 C 65 5 70 20 50 20" stroke="#1F2937" stroke-width="4" stroke-linecap="round" fill="none" />
    <!-- Face (squinting eyes, struggling mouth) -->
    <path d="M 20 15 Q 25 10 30 15 M 30 15 Q 35 10 40 15" stroke="#1F2937" stroke-width="2.5" stroke-linecap="round" fill="none" />
    <path d="M 25 22 Q 30 25 35 22" stroke="#1F2937" stroke-width="2.5" stroke-linecap="round" fill="none" />
  </g>

  <!-- Ground Line -->
  <line x1="250" y1="315" x2="550" y2="315" stroke="#374151" stroke-width="4" stroke-linecap="round" />
</svg>
